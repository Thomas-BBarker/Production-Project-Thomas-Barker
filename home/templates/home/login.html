<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2ff;
            margin: 0;
            padding: 0;
            color: #111827;
        }
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 20px 40px rgba(15,23,42,0.08);
        }
        .card h1 {
            margin: 0 0 10px;
            font-size: 2rem;
            color: #0f172a;
        }
        .card p {
            margin: 0 0 24px;
            color: #4b5563;
        }
        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
        }
        .submit-button {
            width: 100%;
            padding: 14px 16px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .submit-button:hover {
            background: #4338ca;
        }
        .login-footer {
            margin-top: 18px;
            text-align: center;
            color: #6b7280;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Sign in</h1>
            <p>Enter your username and password to continue.</p>
            <form method="post" action="">
                {% csrf_token %}
                <div class="field">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" required>
                </div>
                <div class="field">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" required>
                </div>
                <button type="submit" class="submit-button">Login</button>
            </form>
            <div class="login-footer">
                <p>Return to the <a href="/">home page</a>.</p>
            </div>
        </div>
    </div>
</body>
</html>
